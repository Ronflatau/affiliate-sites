name: Generate Affiliate Content (All Sites)

on:
  schedule:
    # Runs every night at 2:00 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      site_id:
        description: 'Run for a specific site only (leave empty for all)'
        required: false
        default: ''

jobs:
  generate-content:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        site: [ai-tools, web-hosting, finance, saas-software, home-office]
      fail-fast: false
      max-parallel: 1  # Run one at a time to respect API rate limits

    steps:
      - name: Check if this site should run
        id: check
        run: |
          if [ -n "${{ github.event.inputs.site_id }}" ] && [ "${{ github.event.inputs.site_id }}" != "${{ matrix.site }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout repository
        if: steps.check.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        if: steps.check.outputs.skip != 'true'
        run: npm ci

      - name: Generate content for ${{ matrix.site }}
        if: steps.check.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SITE_ID: ${{ matrix.site }}
          ARTICLES_PER_RUN: '3'
        run: node scripts/generate.js

      - name: Commit and push new articles
        if: steps.check.outputs.skip != 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Content Bot"
          git add content/posts/
          if git diff --staged --quiet; then
            echo "No new articles generated"
          else
            git commit -m "auto: add articles for ${{ matrix.site }} [$(date +'%Y-%m-%d')]"
            git push
          fi

      - name: Wait between sites
        if: steps.check.outputs.skip != 'true'
        run: sleep 30
