name: Generate Affiliate Content (All Sites)

on:
  schedule:
    # Runs every night at 2:00 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      site_id:
        description: 'Run for a specific site only (leave empty for all)'
        required: false
        default: ''

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - site: ai-tools
            vercel_project_id: prj_lh3s0IM7TncSWNE0L10VOC2FhVBi
          - site: web-hosting
            vercel_project_id: prj_B7Dfd2kOBvcFeDVYP3XMQO37x49E
          - site: finance
            vercel_project_id: prj_YfShuU9b5Rz19eQhLbnuwjb9Wv5w
          - site: saas-software
            vercel_project_id: prj_22odW8R5eEDPf8P7jhBzhvVuehmO
          - site: home-office
            vercel_project_id: prj_QCA3v66PLDo9EqW3HgRVK9gu5wkZ
      fail-fast: false
      max-parallel: 1

    steps:
      - name: Check if this site should run
        id: check
        run: |
          if [ -n "${{ github.event.inputs.site_id }}" ] && [ "${{ github.event.inputs.site_id }}" != "${{ matrix.site }}" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout repository
        if: steps.check.outputs.skip != 'true'
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        if: steps.check.outputs.skip != 'true'
        run: npm ci

      - name: Generate content for ${{ matrix.site }}
        if: steps.check.outputs.skip != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SITE_ID: ${{ matrix.site }}
          ARTICLES_PER_RUN: '3'
        run: node scripts/generate.js

      - name: Commit new articles
        if: steps.check.outputs.skip != 'true'
        id: commit
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "Content Bot"
          git add content/posts/
          if git diff --staged --quiet; then
            echo "No new articles"
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            git commit -m "auto: add articles for ${{ matrix.site }} [$(date +'%Y-%m-%d')]"
            git push
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to Vercel
        if: steps.check.outputs.skip != 'true'
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: team_AaF1O5oZzFAEr575PVCmlMOP
          VERCEL_PROJECT_ID: ${{ matrix.vercel_project_id }}
          SITE_ID: ${{ matrix.site }}
        run: |
          npm install -g vercel@latest
          vercel deploy --yes --prod \
            --token "$VERCEL_TOKEN" \
            --scope "$VERCEL_ORG_ID" \
            --env "SITE_ID=$SITE_ID" \
            --build-env "SITE_ID=$SITE_ID"

      - name: Wait between sites
        if: steps.check.outputs.skip != 'true'
        run: sleep 15
